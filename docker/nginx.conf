# Cantidad de procesos worker de Nginx (1 suele bastar para este contenedor).
worker_processes 1;

events {
    # Numero maximo de conexiones por worker.
    worker_connections 1024;
}

http {
    # Tipos MIME para servir estaticos correctamente.
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        # Puerto HTTP interno del contenedor.
        listen 80;
        # Acepta cualquier host header (sin dominio fijo).
        server_name _;
        # Public de Laravel como raiz web.
        root /var/www/html/public;
        index index.php index.html;

        location / {
            # Si no existe archivo real, enruta todo a index.php (Laravel routing).
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            # Pasa scripts PHP a php-fpm en el puerto 9000.
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            # Ruta absoluta del script ejecutado por PHP.
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
        }

        location ~ /\.ht {
            # Bloquea acceso a archivos ocultos tipo .htaccess/.htpasswd.
            deny all;
        }
    }
}
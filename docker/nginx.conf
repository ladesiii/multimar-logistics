# Cantidad de procesos worker de Nginx (1 suele bastar para este contenedor).
worker_processes 1;

events {
    # Número máximo de conexiones por worker.
    worker_connections 1024;
}

http {
    # Tipos MIME para servir estáticos correctamente.
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Opcional pero recomendado: Define el backend PHP-FPM en un bloque upstream
    upstream php_backend {
        server 127.0.0.1:9000;
    }

    server {
        # Puerto HTTP interno del contenedor.
        listen 80;

        # Acepta cualquier host header (sin dominio fijo).
        server_name _;

        # Raíz del proyecto donde Laravel guarda sus archivos públicos (index.php, CSS, JS).
        root /var/www/html/public;
        index index.php index.html;

        # 1. Gestión de archivos estáticos y rutas de Laravel
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # 2. El bloque de Proxy Inverso (vía protocolo FastCGI) hacia PHP-FPM
        location ~ \.php$ {
            # Conecta con el upstream definido arriba (PHP-FPM)
            fastcgi_pass php_backend;
            fastcgi_index index.php;

            # Configuración de rutas de archivos para PHP
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;

            # Pasa a PHP el dominio pedido (localhost:8080). Laravel lo necesita para las URLs de los assets de Vite.
            fastcgi_param HTTP_HOST $http_host;
            
        }

        # 3. Seguridad: Bloquear el acceso a archivos ocultos (como .htaccess o .env)
        location ~ /\.ht {
            deny all;
        }
    }
}

# Cantidad de procesos worker de Nginx (1 suele bastar para este contenedor).
worker_processes 1;

events {
    # Numero maximo de conexiones por worker.
    worker_connections 1024;
}

http {
    # Tipos MIME para servir estaticos correctamente.
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream laravel_app {
        # Servidor HTTP interno de Laravel.
        server 127.0.0.1:8000;
    }

    server {
        # Puerto HTTP interno del contenedor.
        listen 80;
        # Acepta cualquier host header (sin dominio fijo).
        server_name _;

        location / {
            # Nginx actua como proxy inverso y reenvia todo a Laravel.
            proxy_pass http://laravel_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}


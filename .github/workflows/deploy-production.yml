# Despliega por FTP cada push a la rama main.
name: Deploy SIMEX via FTP

on:
  # Trigger directo en pushes a main.
  push:
    branches:
      - main

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📂 Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          # Credenciales y host del servidor FTP en Secrets.
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Directorio remoto destino para sincronizar archivos.
          server-dir: ./
          # Excluye archivos/carpetas que no deben subirse a produccion.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/storage/**
            .env
            phpunit.xml
